name: CI

on:
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --engine-strict

      - name: Verify frontend toolchain graph
        run: |
          node --version
          npm --version
          npm ls vite vitest @vitejs/plugin-react jsdom
          npm exec vite -- --version
          npm exec vitest -- --version

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: API smoke tests
        run: npm test -- src/lib/api.test.ts src/lib/api.csrf.test.ts src/lib/api.sse.test.ts src/pages/WikiPage.sse.test.tsx src/stores/useAuthStore.api-base.test.ts

      - name: Accessibility smoke tests
        run: npm run test:a11y

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build subpath deployment
        run: npm run build
        env:
          VITE_APP_BASENAME: /knowledgevault
          VITE_API_URL: /knowledgevault/api

      - name: Build subpath deployment (derived API URL)
        run: npm run build
        env:
          VITE_APP_BASENAME: /meridian

  quality-contracts:
    name: Quality contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Config and env contract check
        run: python scripts/check_config_contract.py

      - name: PR scope drift check
        run: python scripts/check_pr_scope_drift.py

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements-ci.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-ci.txt
          pip install -r requirements-dev.txt
          pip install pytest-xdist

      - name: Lint (ruff)
        run: ruff check .

      - name: Test
        run: pytest --tb=short -v --timeout=300 -n auto tests/
        env:
          REDIS_URL: ""
