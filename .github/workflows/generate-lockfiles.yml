name: Generate Lockfiles

on:
  push:
    branches:
      - claude/issue-220-222-224
  workflow_dispatch:

jobs:
  generate:
    name: Generate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Generate production lockfile
        run: python3.11 -m piptools compile backend/requirements.txt --output-file backend/requirements-lock.txt --generate-hashes --no-header --allow-unsafe --verbose

      - name: Generate CI lockfile
        run: python3.11 -m piptools compile backend/requirements-ci.txt --output-file backend/requirements-lock-ci.txt --generate-hashes --no-header --allow-unsafe --verbose

      - uses: actions/upload-artifact@v4
        with:
          name: lockfiles
          path: backend/requirements-lock*.txt
