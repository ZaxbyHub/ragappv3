# Dependabot keeps dependencies patched so a known-vulnerable transitive
# release is surfaced as a PR instead of being silently pulled in by the
# unbounded ">=" pins in requirements.txt / package.json on the next build.
version: 2
updates:
  # Backend Python dependencies
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Embedding-server sidecar Python dependencies (B6-3: previously uncovered).
  - package-ecosystem: "pip"
    directory: "/backend/embedding_server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Docker base images (root + frontend build/runtime stages)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
  # Embedding-server sidecar Dockerfile (B6-3: previously uncovered).
  - package-ecosystem: "docker"
    directory: "/backend/embedding_server"
    schedule:
      interval: "weekly"

  # GitHub Actions workflow pins
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
